name: Refresh Opportunity Listings

on:
  workflow_dispatch:
  schedule:
    - cron: "40 13 27 4 *"
    - cron: "0 5 * * 1"

permissions:
  contents: write

concurrency:
  group: refresh-opportunities-weekly
  cancel-in-progress: false

jobs:
  refresh-opportunities:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUTF8: "1"
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_BROWSER_RUN_API_TOKEN: ${{ secrets.CLOUDFLARE_BROWSER_RUN_API_TOKEN }}
      R2_SYNC_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_SYNC_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SYNC_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_SYNC_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: back/requirements-opportunity-weekly.txt

      - name: Restore geocode cache
        id: geocode-cache
        uses: actions/cache/restore@v5
        with:
          path: storage/data/intermediate/manual_available_locales_madrid_geocode_cache.csv
          key: manual-available-locales-geocode-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            manual-available-locales-geocode-${{ runner.os }}-

      - name: Install weekly refresh dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r back/requirements-opportunity-weekly.txt

      - name: Detect optional R2 sync configuration
        id: r2-sync
        run: |
          if [ -n "$R2_SYNC_ACCOUNT_ID" ] && [ -n "$R2_SYNC_ACCESS_KEY_ID" ] && [ -n "$R2_SYNC_SECRET_ACCESS_KEY" ] && [ -n "$R2_SYNC_BUCKET_NAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install optional R2 sync dependency
        if: steps.r2-sync.outputs.enabled == 'true'
        run: python -m pip install boto3

      - name: Refresh snapshot with Cloudflare Browser Run
        run: |
          python back/scripts/refresh_opportunity_listings_cloudflare.py \
            --max-pages 24 \
            --max-browser-requests 24 \
            --min-browser-interval-seconds 15 \
            --max-browser-ms-per-run 240000 \
            --max-new-geocodes 40 \
            --geocode-delay-seconds 1.2

      - name: Report refresh outcome
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path("storage/data/processed/manual_available_locales_madrid_refresh_summary.json")
          if not summary_path.exists():
              raise SystemExit(f"Refresh summary missing: {summary_path}")

          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          status = summary.get("status", "unknown")
          reason = summary.get("reason")
          attempts = summary.get("attempts") or []
          print(f"Refresh status: {status}")
          if attempts:
              for attempt in attempts:
                  transport = attempt.get("transport", "unknown")
                  attempt_status = attempt.get("status", "unknown")
                  attempt_reason = attempt.get("reason")
                  if attempt_reason:
                      print(f"- {transport}: {attempt_status} ({attempt_reason})")
                  else:
                      print(f"- {transport}: {attempt_status}")
          if status != "updated":
              message = reason or "Opportunity refresh completed without a new crawl result."
              print(f"::warning::{message}")
          PY

      - name: Rebuild frontend listings payload
        run: |
          python back/scripts/build_frontend_opportunity_listings.py \
            --input-listings-csv back/data/opportunities/manual_available_locales_madrid_snapshot.csv

      - name: Validate frontend payload
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("front/public/data/opportunities/listings.json").read_text(encoding="utf-8"))
          points = payload.get("points")
          if not isinstance(points, list) or not points:
              raise SystemExit("No opportunity points generated.")
          stats = payload.get("stats") or {}
          if stats.get("selected_listings") != len(points):
              raise SystemExit("selected_listings does not match the number of points.")
          print(f"Validated {len(points)} opportunity points.")
          PY

      - name: Detect opportunity refresh changes
        id: changes
        run: |
          if git diff --quiet -- back/data/opportunities/manual_available_locales_madrid_snapshot.csv; then
            echo "snapshot_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "snapshot_changed=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet -- front/public/data/opportunities/listings.json; then
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet -- back/data/opportunities/manual_available_locales_madrid_snapshot.csv front/public/data/opportunities/listings.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save geocode cache
        if: success() && hashFiles('storage/data/intermediate/manual_available_locales_madrid_geocode_cache.csv') != ''
        uses: actions/cache/save@v5
        with:
          path: storage/data/intermediate/manual_available_locales_madrid_geocode_cache.csv
          key: ${{ steps.geocode-cache.outputs.cache-primary-key }}

      - name: Commit and push opportunity refresh
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add back/data/opportunities/manual_available_locales_madrid_snapshot.csv
          git add front/public/data/opportunities/listings.json
          git commit -m "chore: refresh opportunity listings"
          git push

      - name: Publish refreshed opportunity data to R2
        if: steps.changes.outputs.frontend_changed == 'true' && steps.r2-sync.outputs.enabled == 'true'
        env:
          R2_ACCOUNT_ID: ${{ env.R2_SYNC_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ env.R2_SYNC_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ env.R2_SYNC_SECRET_ACCESS_KEY }}
        run: |
          python back/scripts/sync_public_data_to_r2.py \
            --source front/public/data/opportunities \
            --bucket "${{ env.R2_SYNC_BUCKET_NAME }}" \
            --prefix "data/opportunities" \
            --delete-missing
