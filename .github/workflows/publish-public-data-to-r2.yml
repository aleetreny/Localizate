name: Publish Public Data to R2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "front/public/data/**"
      - "!front/public/data/opportunities/listings.json"
      - "back/scripts/sync_public_data_to_r2.py"
      - "back/scripts/materialize_hex_composition_parts.py"
      - ".github/workflows/publish-public-data-to-r2.yml"

permissions:
  contents: read

concurrency:
  group: publish-public-data-to-r2
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate R2 configuration
        run: |
          missing=0

          require_value() {
            local label="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Missing ${label}"
              missing=1
            fi
          }

          require_value "repo variable R2_BUCKET_NAME" "${{ vars.R2_BUCKET_NAME }}"
          require_value "secret CLOUDFLARE_ACCOUNT_ID" "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          require_value "secret R2_ACCESS_KEY_ID" "${{ secrets.R2_ACCESS_KEY_ID }}"
          require_value "secret R2_SECRET_ACCESS_KEY" "${{ secrets.R2_SECRET_ACCESS_KEY }}"

          test "$missing" -eq 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sync dependency
        run: python -m pip install --upgrade pip boto3

      - name: Materialize yearly hex composition parts
        run: python back/scripts/materialize_hex_composition_parts.py

      - name: Sync public data directory to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python back/scripts/sync_public_data_to_r2.py \
            --source front/public/data \
            --bucket "${{ vars.R2_BUCKET_NAME }}" \
            --prefix "data" \
            --delete-missing
