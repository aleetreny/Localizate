name: Publish Public Data to R2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "front/public/data/**"
      - "back/scripts/sync_public_data_to_r2.py"
      - ".github/workflows/publish-public-data-to-r2.yml"

permissions:
  contents: read

concurrency:
  group: publish-public-data-to-r2
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate R2 configuration
        run: |
          test -n "${{ vars.R2_BUCKET_NAME }}" || { echo "Missing repo variable R2_BUCKET_NAME"; exit 1; }
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || { echo "Missing secret CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test -n "${{ secrets.R2_ACCESS_KEY_ID }}" || { echo "Missing secret R2_ACCESS_KEY_ID"; exit 1; }
          test -n "${{ secrets.R2_SECRET_ACCESS_KEY }}" || { echo "Missing secret R2_SECRET_ACCESS_KEY"; exit 1; }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sync dependency
        run: python -m pip install --upgrade pip boto3

      - name: Materialize yearly hex composition parts
        run: python back/scripts/materialize_hex_composition_parts.py

      - name: Sync public data directory to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python back/scripts/sync_public_data_to_r2.py \
            --source front/public/data \
            --bucket "${{ vars.R2_BUCKET_NAME }}" \
            --prefix "data" \
            --delete-missing
