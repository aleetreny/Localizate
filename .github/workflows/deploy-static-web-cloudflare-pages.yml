name: Deploy Static Web to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "front/app/**"
      - "front/components/**"
      - "front/lib/**"
      - "front/package.json"
      - "front/package-lock.json"
      - "front/tsconfig.json"
      - "front/next.config.mjs"
      - "front/scripts/**"
      - "front/.env.example"
      - ".github/workflows/deploy-static-web-cloudflare-pages.yml"

permissions:
  contents: read

concurrency:
  group: deploy-static-web-cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_DATA_BASE_URL: ${{ vars.NEXT_PUBLIC_DATA_BASE_URL }}
      NEXT_PUBLIC_OPPORTUNITY_GEOCODE_ENDPOINT: ${{ vars.NEXT_PUBLIC_OPPORTUNITY_GEOCODE_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        run: |
          missing=0

          require_value() {
            local label="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Missing ${label}"
              missing=1
            fi
          }

          require_value "repo variable NEXT_PUBLIC_DATA_BASE_URL" "$NEXT_PUBLIC_DATA_BASE_URL"
          require_value "repo variable NEXT_PUBLIC_OPPORTUNITY_GEOCODE_ENDPOINT" "$NEXT_PUBLIC_OPPORTUNITY_GEOCODE_ENDPOINT"
          require_value "repo variable CLOUDFLARE_PAGES_PROJECT_NAME" "${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}"
          require_value "secret CLOUDFLARE_API_TOKEN" "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          require_value "secret CLOUDFLARE_ACCOUNT_ID" "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

          test "$missing" -eq 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install frontend dependencies
        working-directory: front
        run: npm ci

      - name: Build static export
        working-directory: front
        run: npm run build:static

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: front
          wranglerVersion: "4.83.0"
          command: pages deploy out --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
