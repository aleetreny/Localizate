name: Deploy Opportunity Geocode Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "workers/opportunity-geocode/**"
      - ".github/workflows/deploy-opportunity-geocode-worker.yml"

permissions:
  contents: read

concurrency:
  group: deploy-opportunity-geocode-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/opportunity-geocode
          command: deploy
